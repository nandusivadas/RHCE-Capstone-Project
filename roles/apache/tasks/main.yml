---
# tasks file for roles/apache

- name: Install Apache
  dnf:
    name: "{{ apache_package }}"
    state: present

- name: Install mod_ssl
  dnf:
    name: mod_ssl
    state: present

- name: Generate SSL Certificate
  command: >
    openssl req -newkey rsa:2048 -nodes
    -keyout /etc/pki/tls/private/server.key
    -x509
    -days 365
    -out /etc/pki/tls/certs/server.crt
    -subj "/CN={{ server_name }}"
  args:
    creates: /etc/pki/tls/certs/server.crt

- name: Enable Apache
  service:
    name: "{{ apache_service }}"
    enabled: yes

- name: Start Apache
  service:
    name: "{{ apache_service }}"
    state: started

- name: Create website directory
  file:
    path: "{{ document_root }}"
    state: directory
    mode: '0755'

- name: Copy Website
  template:
    src: index.html.j2
    dest: "{{ document_root }}/index.html"

- name: Configure VirtualHost
  template:
    src: vhost.conf.j2
    dest: /etc/httpd/conf.d/rhce.conf
  notify:
    - Restart Apache

- name: Configure Global ServerName
  copy:
    dest: /etc/httpd/conf.d/servername.conf
    content: |
      ServerName rhce.local
  notify:
    - Restart Apache

- name: Configure HTTPS VirtualHost
  template:
    src: ssl.conf.j2
    dest: /etc/httpd/conf.d/ssl.conf
  notify:
    - Restart Apache

- name: Install firewalld
  dnf:
    name: firewalld
    state: present

- name: Install python3-firewall
  dnf:
    name: python3-firewall
    state: present

- name: Enable firewalld
  service:
    name: firewalld
    enabled: yes
    state: started

- name: Open HTTP Port
  ansible.posix.firewalld:
    service: http
    permanent: true
    state: enabled
    immediate: true

- name: Open HTTPS Firewall
  ansible.posix.firewalld:
    service: https
    permanent: yes
    state: enabled
    immediate: yes

- name: Restore SELinux Context
  command: restorecon -Rv /var/www/html
