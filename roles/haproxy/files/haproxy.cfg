global
    daemon
    maxconn 256

defaults
    mode http
    timeout connect 5s
    timeout client 50s
    timeout server 50s

frontend http_front
    bind *:80
    default_backend webservers

backend webservers
    balance roundrobin
    server web1 172.31.46.87:80 check
    server web2 172.31.37.159:80 check
